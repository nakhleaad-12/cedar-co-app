<div class="cart-page">
  <div class="container" style="padding-top: 100px; padding-bottom: 5rem; min-height: 70vh;">
    <h1 class="section-title" style="margin-bottom: 2rem;">Your Cart</h1>

    <div class="cart-layout" *ngIf="cart && cart.items.length > 0; else emptyCart">
      <div class="cart-items">
        <div class="cart-item" *ngFor="let item of cart.items">
          <img [src]="item.imageUrl || 'assets/placeholder.jpg'" [alt]="item.productName">
          <div class="item-details">
            <h3>{{ item.productName }}</h3>
            <p class="item-meta">{{ item.size }} · {{ item.color }}</p>
            <div class="qty-controls">
              <button (click)="update(item.id, item.quantity - 1)">−</button>
              <span>{{ item.quantity }}</span>
              <button (click)="update(item.id, item.quantity + 1)">+</button>
            </div>
          </div>
          <div class="item-price">
            <span>${{ item.subtotal.toFixed(2) }}</span>
            <button class="remove-btn" (click)="remove(item.id)">×</button>
          </div>
        </div>
      </div>

      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span>${{ cart.total.toFixed(2) }}</span></div>
        <div class="summary-row"><span>Shipping</span><span>Free</span></div>
        <div class="summary-divider"></div>
        <div class="summary-row total"><span>Total</span><span>${{ cart.total.toFixed(2) }}</span></div>
        <a routerLink="/checkout" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:1.5rem;">Proceed to Checkout</a>
      </div>
    </div>

    <ng-template #emptyCart>
      <div class="empty-state">
        <p>Your cart is empty.</p>
        <a routerLink="/shop" class="btn btn-primary">Start Shopping</a>
      </div>
    </ng-template>
  </div>
</div>
