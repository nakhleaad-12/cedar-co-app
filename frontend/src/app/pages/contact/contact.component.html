<div style="padding-top: 100px; padding-bottom: 5rem; min-height: 60vh;">
  <div class="container">
    <span class="section-label">Get in Touch</span>
    <h1 class="section-title" style="margin-bottom: 2.5rem;">Contact Us</h1>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;">
      <div>
        <p style="color: var(--muted); line-height: 1.8; margin-bottom: 2rem;">Have a question about an order, sizing, or custom requests? We'd love to hear from you.</p>
        <div style="display: flex; flex-direction: column; gap: 1.25rem;">
          <div><strong>Email:</strong><br><a [href]="'mailto:hello' + '@' + 'cedarco.com'" style="color: var(--terracotta);">hello&#64;cedarco.com</a></div>
          <div><strong>WhatsApp:</strong><br>+961 70 123 456</div>
          <div><strong>Address:</strong><br>Gemmayzeh, Beirut, Lebanon</div>
          <div><strong>Hours:</strong><br>Mon–Sat, 10am – 7pm</div>
        </div>
      </div>
      <form (submit)="sendMessage($event)" style="display: flex; flex-direction: column; gap: 1rem;">
        <div class="form-group"><label>Name</label><input [(ngModel)]="name" name="name" placeholder="Your name"></div>
        <div class="form-group"><label>Email</label><input type="email" [(ngModel)]="email" name="email" placeholder="your@email.com"></div>
        <div class="form-group"><label>Message</label><textarea [(ngModel)]="message" name="message" placeholder="How can we help?"></textarea></div>
        <button class="btn btn-primary" type="submit">Send Message</button>
        <p *ngIf="sent" style="color: var(--sage);">✓ Message sent! We'll get back to you within 24 hours.</p>
      </form>
    </div>
  </div>
</div>
