<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <h2>Cedar & Co.</h2>
      <p>Create your account</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" formControlName="firstName" placeholder="Layla">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" formControlName="lastName" placeholder="Khoury">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min. 6 characters">
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="tel" formControlName="phone" placeholder="+961 xx xxx xxx">
      </div>
      <p class="auth-error" *ngIf="error">{{ error }}</p>
      <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center;" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>
    <p class="auth-switch">Already have an account? <a routerLink="/auth/login">Sign In →</a></p>
  </div>
</div>
