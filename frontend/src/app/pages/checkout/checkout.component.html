<div style="padding-top:100px; padding-bottom:5rem; min-height:70vh;">
  <div class="container" style="max-width:640px;">
    <h1 class="section-title" style="margin-bottom:2rem;">Checkout</h1>
    <form (submit)="placeOrder($event)" style="display:flex; flex-direction:column; gap:1rem;">
      <div class="form-group"><label>Street Address</label><input [(ngModel)]="street" name="street" placeholder="12 Gemmayzeh St."></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group"><label>City</label><input [(ngModel)]="city" name="city" placeholder="Beirut"></div>
        <div class="form-group"><label>Country</label><input [(ngModel)]="country" name="country" placeholder="Lebanon"></div>
      </div>
      <div class="form-group"><label>Payment Method</label>
        <select [(ngModel)]="paymentMethod" name="pm">
          <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
          <option value="WHISH">Whish Money</option>
          <option value="CARD">Credit / Debit Card</option>
        </select>
      </div>
      <div class="form-group"><label>Coupon Code (optional)</label><input [(ngModel)]="coupon" name="coupon" placeholder="e.g. WELCOME15"></div>
      <button class="btn btn-primary" type="submit" style="justify-content:center;">Place Order</button>
      <p *ngIf="success" style="color:var(--sage); text-align:center; margin-top:1rem;">✓ Order placed successfully! Check your account for details.</p>
    </form>
  </div>
</div>
