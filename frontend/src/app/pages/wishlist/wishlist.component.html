<div style="padding-top:100px; padding-bottom:5rem; min-height:70vh;">
  <div class="container">
    <h1 class="section-title" style="margin-bottom:2rem;">My Wishlist</h1>
    <div class="products-grid" *ngIf="products.length > 0">
      <app-product-card *ngFor="let p of products" [product]="p"></app-product-card>
    </div>
    <div *ngIf="products.length === 0" style="padding:4rem; text-align:center; color:var(--muted);">
      <p>Your wishlist is empty.</p>
      <a routerLink="/shop" class="btn btn-primary" style="margin-top:1rem;">Browse Products</a>
    </div>
  </div>
</div>
