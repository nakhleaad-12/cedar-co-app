<div class="collections-page">
  <div class="container">
    <span class="section-label">Cedar &amp; Co.</span>
    <h1 class="section-title">Our Collections</h1>
    <div class="collections-list" *ngIf="collections.length > 0">
      <div class="collection-row" *ngFor="let c of collections">
        <div class="collection-season-badge">{{ c.season }}</div>
        <div class="collection-info">
          <h2>{{ c.name }}</h2>
          <p>{{ c.description }}</p>
          <a routerLink="/shop" class="btn btn-outline btn-sm">Shop Collection →</a>
        </div>
      </div>
    </div>
    <div class="loading-row" *ngIf="loading"><div class="spinner"></div></div>
  </div>
</div>
