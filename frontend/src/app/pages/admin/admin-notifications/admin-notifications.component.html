<div class="admin-container">
  <div class="admin-header">
    <h1>Push Notifications</h1>
    <p>Broadcast messages to all registered devices (iOS, Android, Desktop).</p>
  </div>

  <div class="card notification-form">
    <div class="form-group">
      <label for="title">Notification Title</label>
      <input type="text" id="title" [(ngModel)]="title" placeholder="e.g. New Summer Collection!" class="form-control">
    </div>

    <div class="form-group">
      <label for="body">Message Body</label>
      <textarea id="body" [(ngModel)]="body" placeholder="Describe your announcement..." rows="4" class="form-control"></textarea>
    </div>

    <div class="alert" *ngIf="message" [class.alert-success]="message.includes('✅')" [class.alert-danger]="message.includes('❌')">
      {{ message }}
    </div>

    <div class="actions">
      <button (click)="sendBroadcast()" [disabled]="isSending || !title || !body" class="btn btn-primary">
        {{ isSending ? 'Sending...' : 'Send Broadcast to All Users' }}
      </button>
    </div>
  </div>
</div>
