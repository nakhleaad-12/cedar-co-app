<nav class="navbar" [class.scrolled]="scrolled" [class.is-home]="isHome">
  <div class="container navbar-inner">
    <!-- Logo -->
    <a routerLink="/" class="navbar-logo">
      <span class="logo-cedar">Cedar</span>
      <span class="logo-amp">&amp;</span>
      <span class="logo-co">Co.</span>
    </a>

    <!-- Desktop Nav -->
    <ul class="navbar-links" [class.open]="menuOpen">
      <li class="mobile-only-header">
        <button class="close-btn" (click)="menuOpen = false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </li>
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen = false">Home</a></li>
      <li><a routerLink="/shop" routerLinkActive="active" (click)="menuOpen = false">Shop</a></li>
      <li><a routerLink="/collections" routerLinkActive="active" (click)="menuOpen = false">Collections</a></li>
      <li><a routerLink="/about" routerLinkActive="active" (click)="menuOpen = false">About</a></li>
      <li><a routerLink="/contact" routerLinkActive="active" (click)="menuOpen = false">Contact</a></li>
      <li *ngIf="isLoggedIn" class="mobile-notification-item">
        <span>Notifications</span>
        <label class="switch">
          <input type="checkbox" [checked]="push.token$ | async" (change)="toggleNotifications()">
          <span class="slider round"></span>
        </label>
      </li>
    </ul>

    <!-- Actions -->
    <div class="navbar-actions">
      <button class="nav-icon notification-bell" (click)="notificationTrayOpen = !notificationTrayOpen" title="Notifications" *ngIf="isLoggedIn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notification-badge" *ngIf="unreadNotificationsCount > 0">{{ unreadNotificationsCount }}</span>
      </button>

      <a routerLink="/wishlist" class="nav-icon" title="Wishlist" *ngIf="!isAdmin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="wishlist-badge" *ngIf="wishlistCount > 0">{{ wishlistCount }}</span>
      </a>
      <a routerLink="/cart" class="nav-icon cart-icon" title="Cart" *ngIf="!isAdmin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </a>
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/auth/login" class="btn btn-outline btn-sm">Sign In</a>
      </ng-container>
      <ng-container *ngIf="isLoggedIn">
        <div class="user-menu">
          <button class="nav-icon user-btn" (click)="userMenuOpen = !userMenuOpen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
          <div class="user-dropdown" *ngIf="userMenuOpen">
            <a routerLink="/account" (click)="userMenuOpen=false">My Account</a>
            <a routerLink="/account" (click)="userMenuOpen=false">Orders</a>
            <a routerLink="/admin" *ngIf="isAdmin" (click)="userMenuOpen=false">Admin</a>
            <div class="dropdown-notification-toggle">
              <span>Notifications</span>
              <label class="switch">
                <input type="checkbox" [checked]="push.token$ | async" (change)="toggleNotifications()">
                <span class="slider round"></span>
              </label>
            </div>
            <a (click)="logout()" class="logout-link">Sign Out</a>
          </div>
        </div>
      </ng-container>

      <!-- Hamburger -->
      <button class="hamburger" (click)="menuOpen = !menuOpen" [class.open]="menuOpen">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<app-notification-tray 
  [isOpen]="notificationTrayOpen" 
  (close)="notificationTrayOpen = false">
</app-notification-tray>
