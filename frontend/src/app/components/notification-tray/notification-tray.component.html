<div class="notification-tray-overlay" [class.open]="isOpen" (click)="onClose()"></div>

<div class="notification-tray" [class.open]="isOpen">
  <div class="tray-header">
    <h3>Notifications</h3>
    <div class="tray-actions">
      <button (click)="markAllAsRead()" class="action-btn">Mark all as read</button>
      <button (click)="onClose()" class="close-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="tray-content">
    <ng-container *ngIf="(notifications$ | async) as notifs">
      <div *ngIf="notifs.length === 0" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <p>No notifications yet</p>
      </div>

      <div *ngFor="let n of notifs" class="notification-item" [class.unread]="!n.isRead" (click)="markAsRead(n.id)">
        <div class="item-header">
          <span class="title">{{ n.title }}</span>
          <span class="dot" *ngIf="!n.isRead"></span>
        </div>
        <p class="body">{{ n.body }}</p>
        <span class="date">{{ n.createdAt | date:'short' }}</span>
      </div>
    </ng-container>
  </div>
</div>
