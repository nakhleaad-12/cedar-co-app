# ─── Server ───────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── MySQL (Aiven Cloud) ──────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:REPLACE_WITH_YOUR_AIVEN_JDBC_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:REPLACE_WITH_YOUR_AIVEN_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:REPLACE_WITH_YOUR_AIVEN_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

# ─── JWT ──────────────────────────────────────────────────
app.jwt.secret=CedarCoSuperSecretKey2025ForJWTSigningMustBe256BitsLongAtLeast
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# ─── File Upload ──────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=./uploads

# ─── CORS ─────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200,http://localhost:57269

# ─── Logging ──────────────────────────────────────────────
logging.level.com.cedarco=DEBUG
logging.level.org.springframework.security=WARN
